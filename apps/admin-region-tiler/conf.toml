# 地图源配置列表
[[tilemaps]]
  id = 1
  name = "电子地图 (vec_w)"
  url = "https://t0.tianditu.gov.cn/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=YOUR_TIANDITU_TOKEN"
  format = "png"
  schema = "xyz"
  min_zoom = 0
  max_zoom = 18

