name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admin-region-tiler:
    name: Admin Region Tiler
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/admin-region-tiler

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/admin-region-tiler/go.mod
          cache-dependency-path: apps/admin-region-tiler/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser automation dependency
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Run release preflight
        run: node ./scripts/release_preflight.mjs
