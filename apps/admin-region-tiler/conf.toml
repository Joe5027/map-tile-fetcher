[app]
	version = "v 0.1.0"
	title = "MapCloud Tiler"
[output]
	#can be mbtiles/file
	format ="file"
	#the output dir
	directory ="output"
[task]
	#number of fetchers
	workers = 3
	#number of savers
	savepipe = 1
	#min request interval, a speed limit, unit millisecond
	timedelay = 80
	#random jitter added to each request interval, unit millisecond
	time_jitter_ms = 150
	#retry failed tiles in extra passes after the first sweep
	retry_passes = 1
	#max retries for a single HTTP request
	max_retries = 2
	#per-request timeout, unit second
	request_timeout_seconds = 20
	#backoff between immediate retries, unit millisecond
	retry_backoff_ms = 300
	#slowdown after 418/429/5xx throttle-like responses, unit millisecond
	slow_backoff_ms = 1000
	max_slow_backoff_ms = 10000

[auth]
	# Keep login enabled by default for deployed use. Set AUTH_ENABLED=false for trusted local development.
	enabled = true
	default_username = "admin"
	default_password = "adminmap"

