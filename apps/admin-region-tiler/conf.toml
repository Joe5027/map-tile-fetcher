# 多级下载区域配置（全球-中国-省-市-区）
[[download_regions]]
  id = "global"
  name = "全球"
  min_zoom = 0
  max_zoom = 5
  geojson = "./geojson/global.geojson"

[[download_regions]]
  id = "china"
  name = "中国"
  min_zoom = 6
  max_zoom = 8
