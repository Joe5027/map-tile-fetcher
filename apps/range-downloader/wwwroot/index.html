<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天地图瓦片下载器</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23132235'/%3E%3Cpath d='M14 18h36v28H14z' fill='%23e8eef4'/%3E%3Cpath d='M18 38c8-7 15 2 23-5 4-4 7-4 9-4v17H18z' fill='%232867d8' opacity='.45'/%3E%3Cpath d='M22 22h20v16H22z' fill='none' stroke='%232867d8' stroke-width='3' stroke-dasharray='4 3'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="/styles.css?v=20260615-google-preview1">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">地图瓦片下载器</div>
      <div class="layer-status">
        当前图层：
        <span>img 卫星图</span>
        <span>cia 路网</span>
        <span>vec 电子图</span>
      </div>
      <div class="top-tip">点击地图选择范围，第二次点击后自动判断左上 / 右下并回填坐标</div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <section class="panel params-panel">
          <div class="panel-title">
            <h1>下载参数</h1>
          </div>

          <label class="field full">
            <span>任务名称</span>
            <input id="taskName" autocomplete="off" spellcheck="false" maxlength="80" placeholder="请输入本次下载任务名称">
          </label>

          <label class="field full">
            <span>Token</span>
            <input id="token" autocomplete="off" spellcheck="false">
          </label>

          <div class="field full">
            <span>图层选择</span>
            <div class="layer-select">
              <label><input type="checkbox" name="layers" value="img" checked> <span>img 卫星图</span></label>
              <label><input type="checkbox" name="layers" value="cia" checked> <span>cia 路网</span></label>
              <label><input type="checkbox" name="layers" value="vec" checked> <span>vec 电子图</span></label>
            </div>
          </div>

          <div class="field-grid one">
            <label class="field">
              <span class="label-row">请输入要下载的最大层级 <em>范围 1-18</em></span>
              <input id="maxLayer" type="number" min="1" max="18" step="1" placeholder="18">
            </label>
          </div>

          <div class="section-label">范围</div>
          <div class="field-grid two">
            <label class="field">
              <span>左上Lng</span>
              <input id="leftUpLon" type="number" step="0.000001">
            </label>
            <label class="field">
              <span>左上Lat</span>
              <input id="leftUpLat" type="number" step="0.000001">
            </label>
            <label class="field">
              <span>右下Lng</span>
              <input id="rightDownLon" type="number" step="0.000001">
            </label>
            <label class="field">
              <span>右下Lat</span>
              <input id="rightDownLat" type="number" step="0.000001">
            </label>
          </div>

          <label class="field full">
            <span>保存目录</span>
            <input id="downloadPath" spellcheck="false">
          </label>

          <div class="actions">
            <button id="calculateBtn" class="secondary" type="button">计算</button>
            <button id="startBtn" class="primary" type="button">开始下载</button>
          </div>
          <div id="estimate" class="estimate">等待计算</div>
          <div id="message" class="message"></div>
        </section>

        <section class="panel task-panel">
          <div class="panel-title task-title">
            <h2>我的任务</h2>
          </div>
          <div class="task-tabs">
            <span class="active">全部 <b id="allCount">0</b></span>
            <span>运行中 <b id="runningCount">0</b></span>
            <span>完成 <b id="doneCount">0</b></span>
            <span>失败 <b id="failedCount">0</b></span>
          </div>
          <div id="jobList" class="job-list"></div>
          <div id="footerLog" class="task-foot">每个主任务保存到 /data/tiles/tasks/{任务ID}</div>
        </section>
      </aside>

      <section class="map-panel preview-panel">
        <div class="map-header">
          <h2>范围预览</h2>
          <div class="map-tools">
            <label class="preview-source">
              <span>预览源</span>
              <select id="previewSource">
                <option value="tdt">天地图</option>
                <option value="amap">高德</option>
                <option value="google">Google 卫星图</option>
              </select>
            </label>
            <button id="clearRangeBtn" type="button">清除选择</button>
            <button id="resetRangeBtn" type="button">重置范围</button>
            <button id="fitRangeBtn" type="button">适配范围</button>
          </div>
        </div>
        <div class="map-preview">
          <div id="rangeMap"></div>
          <div class="coord-panel">
            <div>鼠标移动坐标：<span id="hoverLngLat">-</span></div>
            <div>鼠标点击坐标：<span id="clickLngLat">-</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/app.js?v=20260615-google-preview1"></script>
</body>
</html>
